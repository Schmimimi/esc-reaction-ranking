<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0b1e;--sur:#1a1535;--sur2:#231c45;--sur3:#2d2558;
  --pk:#e91e8c;--pk2:rgba(233,30,140,.25);--gd:#ffd700;--sl:#c0c0c0;--br:#cd7f32;
  --tx:#f0eaff;--tm:#9b90bf;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);
  --r:12px;--rs:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 15% 15%,rgba(233,30,140,.07) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 85%,rgba(100,50,200,.07) 0%,transparent 55%);
  pointer-events:none;z-index:0}

/* HERO */
.hero{text-align:center;padding:56px 20px 36px;position:relative;z-index:1}
.hero-badge{display:inline-block;background:linear-gradient(135deg,var(--pk),#9b27af);color:#fff;
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:4px 16px;border-radius:100px;margin-bottom:16px}
.hero h1{font-size:clamp(2rem,6vw,3.8rem);font-weight:900;line-height:1.1;margin-bottom:10px;
  background:linear-gradient(135deg,#fff 0%,#f06,#ffd700 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--tm);font-size:15px;max-width:480px;margin:0 auto}

/* NAV */
.nav-wrap{position:sticky;top:0;z-index:100;background:rgba(14,11,30,.92);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 20px}
.nav{display:flex;gap:2px;max-width:1120px;margin:0 auto;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;color:var(--tm);font-family:inherit;font-size:13px;
  font-weight:600;padding:14px 14px 12px;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:color .2s,border-color .2s;position:relative}
.nav-btn:hover{color:var(--tx)}
.nav-btn.active{color:var(--pk);border-bottom-color:var(--pk)}
.nav-btn small{display:block;font-size:10px;font-weight:500;color:var(--tm);margin-top:1px}

/* MAIN */
.main{max-width:1120px;margin:0 auto;padding:28px 20px 80px;position:relative;z-index:1}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:24px;margin-bottom:20px}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--tm);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--pk);flex-shrink:0}

/* EPISODE HEADER */
.ep-header{background:linear-gradient(135deg,var(--sur) 0%,var(--sur2) 100%);
  border:1px solid var(--bd);border-radius:var(--r);padding:28px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.ep-hosts{display:flex;align-items:center;gap:20px}
.host{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;min-width:80px}
.av-wrap{position:relative;width:72px;height:72px}
.av{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--bd2)}
.av.main-host{border-color:var(--pk);box-shadow:0 0 18px var(--pk2)}
.av.guest-host{border-color:var(--gd);box-shadow:0 0 18px rgba(255,215,0,.25)}
.av-fb{width:72px;height:72px;border-radius:50%;display:none;align-items:center;justify-content:center;
  font-size:26px;font-weight:800;color:#fff;border:3px solid var(--bd2)}
.av-fb.main-host{border-color:var(--pk);box-shadow:0 0 18px var(--pk2);background:linear-gradient(135deg,#e91e8c,#9b27af)}
.av-fb.guest-host{border-color:var(--gd);box-shadow:0 0 18px rgba(255,215,0,.25);background:linear-gradient(135deg,#ffd700,#ff9800)}
.host-name{font-size:14px;font-weight:700}
.host-role{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tm)}
.host-pts{font-size:12px;color:var(--tm)}
.host-pts b{color:var(--tx)}
.vs{font-size:22px;color:var(--bd2);font-weight:300;user-select:none}
.ep-total{text-align:right}
.ep-total-n{font-size:48px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,#fff,var(--pk));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ep-total-l{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--tm)}
.ep-total-sub{font-size:12px;color:var(--tm);margin-top:4px}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-lbl{font-size:12px;color:var(--tm);font-weight:500}
.fbtn{background:var(--sur);border:1px solid var(--bd);color:var(--tm);font-family:inherit;
  font-size:12px;font-weight:600;padding:5px 14px;border-radius:100px;cursor:pointer;transition:all .18s}
.fbtn:hover{border-color:var(--bd2);color:var(--tx)}
.fbtn.on{background:var(--pk);border-color:var(--pk);color:#fff}
.search-wrap{margin-left:auto}
.search{background:var(--sur);border:1px solid var(--bd);color:var(--tx);font-family:inherit;
  font-size:13px;padding:6px 14px;border-radius:100px;outline:none;transition:border-color .2s;width:180px}
.search:focus{border-color:var(--pk)}
.search::placeholder{color:var(--tm)}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;font-size:14px}
thead tr{background:var(--sur2)}
thead th{padding:13px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--tm);cursor:pointer;user-select:none;white-space:nowrap;transition:color .2s}
thead th:hover{color:var(--tx)}
thead th.asc::after{content:" ↑";color:var(--pk)}
thead th.desc::after{content:" ↓";color:var(--pk)}
tbody tr{border-top:1px solid var(--bd);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody td{padding:11px 14px;vertical-align:middle}
.rk{font-weight:700;text-align:center;width:42px;font-size:15px}
.rk1{color:var(--gd)}.rk2{color:var(--sl)}.rk3{color:var(--br)}
.cc{display:flex;align-items:center;gap:12px}
.flag{width:30px;height:30px;object-fit:contain;flex-shrink:0}
.cname{font-weight:600}
.sc{display:flex;align-items:center;gap:8px}
.sc-val{font-weight:700;width:30px;text-align:right;font-size:14px}
.bar-w{width:60px;height:5px;background:var(--sur3);border-radius:3px;overflow:hidden;flex-shrink:0}
.bar-f{height:100%;border-radius:3px;background:var(--pk);transition:width .3s}
.bar-g{background:var(--gd)}
.sum-cell{font-size:16px;font-weight:800}
.ep-tag{display:inline-block;background:var(--sur3);color:var(--tm);font-size:10px;
  font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:.5px}
.diff-chip{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px}
.diff-pos{background:rgba(233,30,140,.15);color:var(--pk)}
.diff-neg{background:rgba(255,215,0,.12);color:var(--gd)}
.diff-zero{background:rgba(255,255,255,.07);color:var(--tm)}
.no-data{text-align:center;padding:40px;color:var(--tm);font-size:14px}
.song-name{font-size:11px;color:var(--tm);margin-top:2px;font-weight:400}
.yt-btn{display:inline-flex;align-items:center;gap:4px;background:transparent;color:var(--tm);
  font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-decoration:none;border:1px solid var(--bd2);
  transition:all .2s;white-space:nowrap;line-height:1.6;flex-shrink:0}
.yt-btn:hover{color:#fff;border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.06)}
.has-note{cursor:pointer;text-decoration:underline dotted 1px var(--tm);text-underline-offset:3px;transition:color .2s}
.has-note:hover{color:var(--pk)}
#note-pop{position:fixed;z-index:999;background:var(--sur2);border:1px solid var(--bd2);
  border-radius:var(--rs);padding:12px 16px;max-width:260px;font-size:13px;line-height:1.5;
  box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;pointer-events:none}
#note-pop.visible{display:block}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:20px}
.stats-grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:20px}
.juror-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:20px;
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
.juror-av-wrap{position:relative}
.juror-av{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--bd2)}
.juror-av.s-host{border-color:var(--pk);box-shadow:0 0 14px var(--pk2)}
.juror-av.g-host{border-color:var(--gd);box-shadow:0 0 14px rgba(255,215,0,.2)}
.juror-av-fb{width:64px;height:64px;border-radius:50%;display:none;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#fff}
.juror-av-fb.s-host{border:3px solid var(--pk);box-shadow:0 0 14px var(--pk2);background:linear-gradient(135deg,#e91e8c,#9b27af)}
.juror-av-fb.g-host{border:3px solid var(--gd);box-shadow:0 0 14px rgba(255,215,0,.2);background:linear-gradient(135deg,#ffd700,#ff9800)}
.juror-name{font-size:15px;font-weight:800}
.juror-role{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tm)}
.juror-stat-row{display:flex;gap:16px;justify-content:center;width:100%}
.jstat{display:flex;flex-direction:column;align-items:center;gap:2px}
.jstat-n{font-size:20px;font-weight:800;color:var(--tx)}
.jstat-l{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--tm)}
.bar-row{width:100%;display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.br-head{display:flex;justify-content:space-between;font-size:12px}
.br-name{font-weight:600}
.br-val{font-weight:700;color:var(--pk)}
.br-track{height:8px;background:var(--sur3);border-radius:4px;overflow:hidden}
.br-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--pk),#9b27af)}
.br-fill.gd{background:linear-gradient(90deg,var(--gd),#ff9800)}
.disagree-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.disagree-row:last-child{border-bottom:none}
.disagree-info{flex:1}
.disagree-country{font-weight:700;font-size:14px}
.disagree-sub{font-size:11px;color:var(--tm);margin-top:2px}
.disagree-diff{font-size:20px;font-weight:900;color:var(--pk);min-width:36px;text-align:right}
.agree-row{margin-bottom:14px}
.ag-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.ag-name{font-weight:600}
.ag-score{font-weight:700}
.ag-track{height:8px;background:var(--sur3);border-radius:4px;overflow:hidden}
.ag-fill{height:100%;border-radius:4px}
.tens-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px}
.ten-item{background:var(--sur2);border:1px solid var(--bd);border-radius:var(--rs);
  padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.ten-flag{width:34px;height:34px;object-fit:contain}
.socials{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.social-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:100px;
  text-decoration:none;font-size:13px;font-weight:700;transition:all .18s;line-height:1}
.social-btn svg{width:16px;height:16px;flex-shrink:0}
.s-twitch{background:#9146ff;color:#fff}.s-twitch:hover{background:#7c30e8}
.s-tiktok{background:#111;color:#fff;border:1px solid rgba(255,255,255,.1)}.s-tiktok:hover{background:#222}
.s-ig{background:linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);color:#fff}.s-ig:hover{opacity:.85}
.s-discord{background:#5865f2;color:#fff;padding:11px 24px;font-size:15px;box-shadow:0 0 18px rgba(88,101,242,.5)}.s-discord:hover{background:#4752c4;box-shadow:0 0 26px rgba(88,101,242,.7)}.s-discord svg{width:20px;height:20px}
.host-socials{display:flex;gap:6px;justify-content:center;margin-top:8px}
.hs-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;text-decoration:none;transition:all .18s}
.hs-btn svg{width:13px;height:13px}
.hs-tw{background:#9146ff;color:#fff}.hs-tw:hover{background:#7c30e8}
.hs-tt{background:#111;color:#fff;border:1px solid rgba(255,255,255,.15)}.hs-tt:hover{background:#333}
.hs-ig{background:linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);color:#fff}.hs-ig:hover{opacity:.8}
.footer{text-align:center;padding:20px;border-top:1px solid var(--bd)}
.footer a{color:var(--tm);font-size:12px;text-decoration:none;transition:color .2s}.footer a:hover{color:var(--tx)}
.ten-cname{font-size:11px;font-weight:700;line-height:1.2}
.ten-who{font-size:10px;color:var(--tm)}
.ten-score{font-size:15px;font-weight:900;color:var(--gd)}

/* TOP PICKS */
.pick-list{display:flex;flex-direction:column;gap:10px}
.pick-item{display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--sur2);border-radius:var(--rs);border:1px solid var(--bd)}
.pick-rank{font-size:18px;width:28px;text-align:center}
.pick-flag{width:28px;height:28px;object-fit:contain}
.pick-info{flex:1}
.pick-cname{font-size:13px;font-weight:700}
.pick-ep{font-size:11px;color:var(--tm)}
.pick-score{font-size:18px;font-weight:900;color:var(--pk)}

/* RESPONSIVE */
@media(max-width:640px){

const SCHMILLEY = {name:"Schmilley", twitch:"schmilley"};

const ALL = EPS.flatMap(ep => ep.entries.map(e => ({
  ...e, sum: e.s + e.g, ep: ep.id, yt: ep.yt,
  guestName: ep.guest.name, guestTwitch: ep.guest.twitch,
})));

// ── HELPERS ──────────────────────────────────────────────────────────────
const flagUrl = en =>
  `https://commons.wikimedia.org/wiki/Special:FilePath/Eurovision_2026_white_heart_-_${en}.svg`;

const avatarUrl = tw => `https://unavatar.io/twitch/${tw}`;

const fmt = n => (n % 1 === 0 ? String(n) : String(n).replace('.', ','));

function pct(val, max){ return Math.min(100, Math.round(val / max * 100)); }

function flagImg(en, cls='flag'){
  return `<img src="${flagUrl(en)}" class="${cls}" loading="lazy"
    onerror="this.style.opacity='0.15'">`;
}

function avatar(twitch, cls, fbLetter, fbCls){
  return `<div class="av-wrap">
    <img src="${avatarUrl(twitch)}" class="av ${cls}" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="av-fb ${fbCls}" style="position:absolute;inset:0;border-radius:50%">${fbLetter}</div>
  </div>`;
}

function jurorAvatar(twitch, cls, letter){
  return `<div class="juror-av-wrap">
    <img src="${avatarUrl(twitch)}" class="juror-av ${cls}" loading="lazy"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="juror-av-fb ${cls}" style="width:64px;height:64px;border-radius:50%;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff">${letter}</div>
  </div>`;
}

function rankIcon(i){
  if(i===0) return `<span class="rk rk1">🥇</span>`;
  if(i===1) return `<span class="rk rk2">🥈</span>`;
  if(i===2) return `<span class="rk rk3">🥉</span>`;
  return `<span class="rk" style="color:var(--tm)">${i+1}</span>`;
}

// ── SORT STATE ────────────────────────────────────────────────────────────
const sorts = {
  gesamt:{col:'sum',dir:-1},
  ep1:{col:'sum',dir:-1}, ep2:{col:'sum',dir:-1},
  ep3:{col:'sum',dir:-1}, ep4:{col:'sum',dir:-1}, ep5:{col:'sum',dir:-1},
};
let gesamtFilter = 0;
let gesamtSearch = '';

// ── TABLE BUILDER ─────────────────────────────────────────────────────────
function sortData(data, col, dir){
  return [...data].sort((a,b) => {
    const va = col==='de' ? a.de : (col==='s' ? a.s : col==='g' ? a.g : a.sum);
    const vb = col==='de' ? b.de : (col==='s' ? b.s : col==='g' ? b.g : b.sum);
    if(typeof va === 'string') return dir * va.localeCompare(vb, 'de');
    return (va - vb) * dir;
  });
}

function buildGestamtRows(data){
  const {col, dir} = sorts.gesamt;
  let d = [...data];
  if(gesamtFilter > 0) d = d.filter(e => e.ep === gesamtFilter);
  if(gesamtSearch) d = d.filter(e => e.de.toLowerCase().includes(gesamtSearch.toLowerCase()));
  d = sortData(d, col, dir);
  return d.map((e, i) => {
    const diff = e.s - e.g;
    const diffLabel = diff === 0
      ? `<span class="diff-chip diff-zero">±0</span>`
      : diff > 0
        ? `<span class="diff-chip diff-pos">+${fmt(diff)}</span>`
        : `<span class="diff-chip diff-neg">${fmt(diff).replace('-','–')}</span>`;
    const ytBtn = (e.yt && e.t !== null)
      ? `<a class="yt-btn" href="https://www.youtube.com/watch?v=${e.yt}&t=${e.t}" target="_blank">▶ Zur Reaction</a>` : '';
    return `<tr>
      <td>${rankIcon(i)}</td>
      <td><div class="cc">${flagImg(e.en)}<div><div style="display:flex;align-items:center;gap:7px"><span class="cname">${e.de}</span>${ytBtn}</div>${e.note?`<div class="song-name has-note" data-note="${e.note}" onclick="showNoteEl(event,this)">⚠ Kein offizieller Teilnehmer</div>`:''}${e.song?`<div class="song-name">${e.song}</div>`:''}</div></div></td>
      <td><div class="sc"><span class="sc-val">${fmt(e.s)}</span>
        <div class="bar-w"><div class="bar-f" style="width:${pct(e.s,10)}%"></div></div></div></td>
      <td><div class="sc"><span class="sc-val">${fmt(e.g)}</span>
        <div class="bar-w"><div class="bar-f bar-g" style="width:${pct(e.g,10)}%"></div></div></div></td>
      <td class="sum-cell">${fmt(e.sum)}</td>
      <td>${diffLabel}</td>
      <td><span class="ep-tag">F${e.ep} · ${e.guestName}</span></td>
    </tr>`;
  }).join('') || `<tr><td colspan="7" class="no-data">Keine Länder gefunden</td></tr>`;
}

function buildEpRows(ep, sortKey){
  const {col, dir} = sorts[sortKey];
  const d = sortData(ep.entries.map(e => ({...e, sum: e.s+e.g})), col, dir);
  return d.map((e, i) => {
    const ytBtn = (ep.yt && e.t !== null)
      ? `<a class="yt-btn" href="https://www.youtube.com/watch?v=${ep.yt}&t=${e.t}" target="_blank">▶ Zur Reaction</a>` : '';
    return `<tr>
    <td>${rankIcon(i)}</td>
    <td><div class="cc">${flagImg(e.en)}<div><div style="display:flex;align-items:center;gap:7px"><span class="cname">${e.de}</span>${ytBtn}</div>${e.note?`<div class="song-name has-note" data-note="${e.note}" onclick="showNoteEl(event,this)">⚠ Kein offizieller Teilnehmer</div>`:''}${e.song?`<div class="song-name">${e.song}</div>`:''}</div></div></td>
    <td><div class="sc"><span class="sc-val">${fmt(e.s)}</span>
      <div class="bar-w"><div class="bar-f" style="width:${pct(e.s,10)}%"></div></div></div></td>
    <td><div class="sc"><span class="sc-val">${fmt(e.g)}</span>
      <div class="bar-w"><div class="bar-f bar-g" style="width:${pct(e.g,10)}%"></div></div></div></td>
    <td class="sum-cell">${fmt(e.sum)}</td>
  </tr>`;
  }).join('');
}

function thClass(tableKey, col){
  const s = sorts[tableKey];
  if(s.col !== col) return '';
  return s.dir === -1 ? 'desc' : 'asc';
}

function handleSort(tableKey, col){
  const s = sorts[tableKey];
  if(s.col === col){ s.dir *= -1; }
  else { s.col = col; s.dir = col==='de' ? 1 : -1; }
  if(tableKey === 'gesamt') rerenderGesamt();
  else rerenderEp(parseInt(tableKey.replace('ep',''), 10));
}

function rerenderGesamt(){
  const tbody = document.getElementById('g-tbody');
  if(tbody) tbody.innerHTML = buildGestamtRows(ALL);
  // update sort classes
  ['de','s','g','sum'].forEach(col => {
    const th = document.getElementById(`gh-${col}`);
    if(th){ th.className = thClass('gesamt', col); }
  });
}

function rerenderEp(id){
  const ep = EPS.find(e => e.id === id);
  const key = `ep${id}`;
  const tbody = document.getElementById(`ep${id}-tbody`);
  if(tbody) tbody.innerHTML = buildEpRows(ep, key);
  ['de','s','g','sum'].forEach(col => {
    const th = document.getElementById(`ep${id}h-${col}`);
    if(th){ th.className = thClass(key, col); }
  });
}

// ── RENDER: GESAMT ────────────────────────────────────────────────────────
function renderGesamt(){
  const el = document.getElementById('tab-gesamt');
  el.innerHTML = `
    <div style="margin-bottom:24px">
      <h2 style="font-size:22px;font-weight:800;margin-bottom:6px">🌍 Gesamtrangliste</h2>
      <p style="color:var(--tm);font-size:14px">Alle 35 Länder · sortierbar nach Schmilley, Gast oder Gesamtpunkten</p>
    </div>
    <div class="filter-bar">
      <span class="filter-lbl">Folge:</span>
      <button class="fbtn on" onclick="setGFilter(0)">Alle</button>
      ${EPS.map(ep => `<button class="fbtn" onclick="setGFilter(${ep.id})">F${ep.id} · ${ep.guest.name}</button>`).join('')}
      <div class="search-wrap">
        <input class="search" placeholder="🔍 Land suchen…" oninput="setGSearch(this.value)">
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:48px">#</th>
          <th id="gh-de" class="${thClass('gesamt','de')}" onclick="handleSort('gesamt','de')">Land</th>
          <th id="gh-s" class="${thClass('gesamt','s')}" onclick="handleSort('gesamt','s')">Schmilley</th>
          <th id="gh-g" class="${thClass('gesamt','g')}" onclick="handleSort('gesamt','g')">Gast</th>
          <th id="gh-sum" class="${thClass('gesamt','sum')}" onclick="handleSort('gesamt','sum')">Gesamt</th>
          <th>Differenz</th>
          <th>Folge</th>
        </tr></thead>
        <tbody id="g-tbody">${buildGestamtRows(ALL)}</tbody>
      </table>
    </div>`;
}

function setGFilter(ep){
  gesamtFilter = ep;
  document.querySelectorAll('#tab-gesamt .fbtn').forEach((b,i) => b.classList.toggle('on', i === ep));
  rerenderGesamt();
}

function setGSearch(val){
  gesamtSearch = val;
  rerenderGesamt();
}

          <div class="host-pts">∑ <b>${fmt(ep.guest.gTotal)}</b> · ⌀ <b>${gAvg}</b></div>
          <div class="host-socials">
            <a href="https://www.twitch.tv/${ep.guest.twitch}" class="hs-btn hs-tw" target="_blank" title="Twitch"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg></a>
            ${ep.guest.tiktok ? `<a href="https://www.tiktok.com/@${ep.guest.tiktok}" class="hs-btn hs-tt" target="_blank" title="TikTok"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.25 8.25 0 004.83 1.56V6.86a4.85 4.85 0 01-1.06-.17z"/></svg></a>` : ''}
            ${ep.guest.ig ? `<a href="https://www.instagram.com/${ep.guest.ig}" class="hs-btn hs-ig" target="_blank" title="Instagram"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98C.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>` : ''}
          </div>
        </div>
      </div>
      <div class="ep-total">
        <div class="ep-total-n">${fmt(total)}</div>
        <div class="ep-total-l">Gesamtpunkte</div>
        <div class="ep-total-sub">${ep.entries.length} Länder bewertet</div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:48px">#</th>
          <th id="ep${id}h-de" class="${thClass(key,'de')}" onclick="handleSort('${key}','de')">Land</th>
          <th id="ep${id}h-s" class="${thClass(key,'s')}" onclick="handleSort('${key}','s')">Schmilley</th>
          <th id="ep${id}h-g" class="${thClass(key,'g')}" onclick="handleSort('${key}','g')">${ep.guest.name}</th>
          <th id="ep${id}h-sum" class="${thClass(key,'sum')}" onclick="handleSort('${key}','sum')">Gesamt</th>
        </tr></thead>
        <tbody id="ep${id}-tbody">${buildEpRows(ep, key)}</tbody>
      </table>
    </div>`;
}

// ── RENDER: STATS ─────────────────────────────────────────────────────────
function renderStats(){
  // Juror profiles
  const jurors = [
    { name:'Schmilley', twitch:'schmilley', isSch:true,
      scores: ALL.map(e=>e.s), epIds:[1,2,3,4,5] },
    ...EPS.map(ep => ({
      name: ep.guest.name, twitch: ep.guest.twitch, isSch:false,
      scores: ep.entries.map(e=>e.g), epIds:[ep.id],
    }))
  ];

  jurors.forEach(j => {
    j.total = j.scores.reduce((a,b)=>a+b,0);
    j.avg   = Math.round(j.total/j.scores.length*100)/100;
    j.tens  = j.scores.filter(s=>s===10).length;
    j.max   = Math.max(...j.scores);
    j.min   = Math.min(...j.scores);
  });

  const maxTotal = Math.max(...jurors.filter(j=>!j.isSch).map(j=>j.total));

  const jurorCards = jurors.map(j => {
    const cls = j.isSch ? 's-host' : 'g-host';
    const letter = j.name[0];
    return `<div class="juror-card">
      ${jurorAvatar(j.twitch, cls, letter)}
      <div class="juror-name">${j.name}</div>
      <div class="juror-role">${j.isSch ? 'Host · alle Folgen' : `Gast · Folge ${j.epIds[0]}`}</div>
      <div class="juror-stat-row">
        <div class="jstat"><span class="jstat-n">${fmt(j.total)}</span><span class="jstat-l">Gesamt</span></div>
        <div class="jstat"><span class="jstat-n">${fmt(j.avg).replace('.',',')}</span><span class="jstat-l">⌀ Pro Song</span></div>
        <div class="jstat"><span class="jstat-n" style="color:var(--gd)">${j.tens}</span><span class="jstat-l">× 10 Pkt</span></div>
      </div>
      <div style="width:100%;height:6px;background:var(--sur3);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct(j.total,maxTotal)}%;border-radius:3px;background:${j.isSch?'linear-gradient(90deg,var(--pk),#9b27af)':'linear-gradient(90deg,var(--gd),#ff9800)'}"></div>
      </div>
    </div>`;
  }).join('');

  // Episode comparison
  const maxEpTotal = Math.max(...EPS.map(e=>e.guest.sTotal+e.guest.gTotal));
  const epBars = EPS.map(ep => {
    const tot = ep.guest.sTotal + ep.guest.gTotal;
    return `<div class="bar-row">
      <div class="br-head">
        <span class="br-name">F${ep.id} · ${ep.guest.name}</span>
        <span class="br-val">${fmt(tot)} Pkt</span>
      </div>
      <div class="br-track">
        <div class="br-fill" style="width:${pct(tot,maxEpTotal)}%"></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:4px;font-size:11px;color:var(--tm)">
        <span>Schmilley: <b style="color:var(--tx)">${fmt(ep.guest.sTotal)}</b></span>
        <span>${ep.guest.name}: <b style="color:var(--tx)">${fmt(ep.guest.gTotal)}</b></span>
      </div>
    </div>`;
  }).join('');

  // Agreement per episode (lower avg diff = more agreement)
  const agreements = EPS.map(ep => {
    const diffs = ep.entries.map(e => Math.abs(e.s - e.g));
    const avgDiff = diffs.reduce((a,b)=>a+b,0) / diffs.length;
    return { epId: ep.id, guestName: ep.guest.name, avgDiff: Math.round(avgDiff*100)/100 };
  }).sort((a,b) => a.avgDiff - b.avgDiff);

  const maxDiff = Math.max(...agreements.map(a=>a.avgDiff));
  const agColors = ['#22c55e','#84cc16','#eab308','#f97316','#ef4444'];
  const agBars = agreements.map((a,i) => {
    const agreement = Math.max(0, 100 - pct(a.avgDiff, maxDiff));
    return `<div class="agree-row">
      <div class="ag-head">
        <span class="ag-name">F${a.epId} · ${a.guestName}</span>
        <span class="ag-score" style="color:${agColors[i]}">⌀ Δ ${fmt(a.avgDiff).replace('.',',')}</span>
      </div>
      <div class="ag-track">
        <div class="ag-fill" style="width:${agreement}%;background:${agColors[i]}"></div>
      </div>
    </div>`;
  }).join('');

  // Biggest disagreements
  const disagrees = ALL.map(e => ({...e, diff: Math.abs(e.s - e.g)}))
    .sort((a,b) => b.diff - a.diff)
    .slice(0, 6);

  const disagreeRows = disagrees.map(e => `
    <div class="disagree-row">
      ${flagImg(e.en)}
      <div class="disagree-info">
        <div class="disagree-country">${e.de}</div>
        <div class="disagree-sub">Schmilley ${fmt(e.s)} · ${e.guestName} ${fmt(e.g)} · F${e.ep}</div>
      </div>
      <div class="disagree-diff">Δ ${fmt(e.diff).replace('.',',')}</div>
    </div>`).join('');

  // 10-Punkte-Klub
  const tens = [];
  EPS.forEach(ep => {
    ep.entries.forEach(e => {
      if(e.s === 10) tens.push({de:e.de, en:e.en, who:'Schmilley', score:10, ep:ep.id});
      if(e.g === 10) tens.push({de:e.de, en:e.en, who:ep.guest.name, score:10, ep:ep.id});
    });
  });

  const tensGrid = tens.map(t => `
    <div class="ten-item">
      ${flagImg(t.en,'ten-flag')}
      <div class="ten-cname">${t.de}</div>
      <div class="ten-score">10</div>
      <div class="ten-who">${t.who}</div>
    </div>`).join('');

  // Schmilley top picks (persönliche Reihenfolge)
  const schTopNames = ["Finnland","Dänemark","Schweden","Griechenland","Österreich"];
  const schTop = schTopNames.map(name => ALL.find(e => e.de === name));
  const schPicks = schTop.map((e,i) => `
    <div class="pick-item">
      ${rankIcon(i)}
      ${flagImg(e.en,'pick-flag')}
      <div class="pick-info">
        <div class="pick-cname">${e.de}</div>
        <div class="pick-ep">F${e.ep} · Gast: ${e.guestName}</div>
      </div>
      <div class="pick-score">${fmt(e.s)}</div>
    </div>`).join('');

  // Guest top picks (each guest's best)
  const guestPicks = EPS.map(ep => {
    const top = ep.entries.map(e=>({...e,sum:e.s+e.g})).sort((a,b)=>b.g-a.g)[0];
    return `<div class="pick-item">
      ${flagImg(top.en,'pick-flag')}
      <div class="pick-info">
        <div class="pick-cname">${top.de}</div>
        <div class="pick-ep">${ep.guest.name} · F${ep.id}</div>
      </div>
      <div class="pick-score" style="color:var(--gd)">${fmt(top.g)}</div>
    </div>`;
  }).join('');

  const el = document.getElementById('tab-stats');
  el.innerHTML = `
    <div style="margin-bottom:24px">
      <h2 style="font-size:22px;font-weight:800;margin-bottom:6px">📊 Statistiken</h2>
      <p style="color:var(--tm);font-size:14px">Tiefere Einblicke in die Bewertungen</p>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-title"><div class="dot"></div>Juroren-Profil</div>
      <div class="stats-grid-3">${jurorCards}</div>
    </div>

    <div class="stats-grid">
      <div class="card">
        <div class="card-title"><div class="dot"></div>Punkte pro Folge</div>
        ${epBars}
      </div>
      <div class="card">
        <div class="card-title"><div class="dot"></div>Übereinstimmung mit Schmilley</div>
        <p style="font-size:12px;color:var(--tm);margin-bottom:16px">Niedrigere Ø-Abweichung = mehr Einigkeit</p>
        ${agBars}
        <p style="font-size:11px;color:var(--tm);margin-top:12px;border-top:1px solid var(--bd);padding-top:12px">
          🏆 Miro &amp; Chrigee liegen am nächsten an Schmilleys Geschmack (Ø Δ 0,71)
        </p>
      </div>
    </div>

    <div class="stats-grid">
      <div class="card">
        <div class="card-title"><div class="dot"></div>Größte Diskrepanzen</div>
        ${disagreeRows}
      </div>
      <div class="card">
        <div class="card-title"><div class="dot"></div>Zehn-Punkte-Klub 🏆</div>
        <p style="font-size:12px;color:var(--tm);margin-bottom:16px">${tens.length} perfekte 10er vergeben</p>
        <div class="tens-grid">${tensGrid}</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="card">
        <div class="card-title"><div class="dot"></div>Schmilleys Top 5</div>
        <div class="pick-list">${schPicks}</div>
      </div>
      <div class="card">
        <div class="card-title"><div class="dot"></div>Favorit jedes Gastes</div>
        <div class="pick-list">${guestPicks}</div>
      </div>
    </div>`;
}

// ── TABS ──────────────────────────────────────────────────────────────────
const TABS = [
  {id:'gesamt', label:'🌍 Gesamt', sub:''},
  ...EPS.map(ep => ({id:`ep${ep.id}`, label:`Folge ${ep.id}`, sub:ep.guest.name})),
  {id:'stats', label:'📊 Statistiken', sub:''},
];

function showTab(id){
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${id}`).classList.add('active');
  document.getElementById(`navbtn-${id}`).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = TABS.map(t => `
    <button id="navbtn-${t.id}" class="nav-btn${t.id==='gesamt'?' active':''}"
      onclick="showTab('${t.id}')">
      ${t.label}${t.sub ? `<small>${t.sub}</small>` : ''}
    </button>`).join('');
}

// ── NOTE POPOVER ──────────────────────────────────────────────────────────
const pop = document.getElementById('note-pop');

function showNoteEl(e, el){
  e.stopPropagation();
  if(pop.classList.contains('visible') && pop.dataset.key === el.dataset.note){ hideNote(); return; }
  pop.textContent = el.dataset.note;
  pop.dataset.key = el.dataset.note;
  const r = el.getBoundingClientRect();
  const pw = 260, gap = 8;
  let left = r.left + r.width / 2 - pw / 2;
  let top  = r.bottom + gap;
  left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
  pop.classList.add('visible');
}

function hideNote(){ pop.classList.remove('visible'); pop.dataset.key = ''; }
document.addEventListener('click', () => hideNote());
document.addEventListener('scroll', () => hideNote(), {passive:true});
document.addEventListener('click', e => { if(!e.target.closest('.note-i')) hideNote(); });
document.addEventListener('scroll', hideNote, {passive:true});

// ── INIT ──────────────────────────────────────────────────────────────────
buildNav();
renderGesamt();
EPS.forEach(ep => renderEpisode(ep.id));
renderStats();
</script>
</body>
</html>
